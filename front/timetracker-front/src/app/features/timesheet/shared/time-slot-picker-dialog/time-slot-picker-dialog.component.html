<h2 mat-dialog-title>{{ 'time_entry_dialog_title' | translate }}</h2>

<mat-dialog-content class="entry-dialog-content">
  <div class="ticket-ref">{{ data.ticketRef }}</div>
  <div class="ticket-label">{{ data.ticketLabel || '-' }}</div>
  <div class="entry-day">{{ data.dayLabel }}</div>

  <mat-form-field appearance="outline">
    <mat-label>{{ 'logged_time' | translate }}</mat-label>
    <mat-select
      [value]="selectedMinutes()"
      (selectionChange)="selectedMinutes.set($event.value)"
    >
      @for (option of data.options; track option.minutes) {
        <mat-option [value]="option.minutes">{{ option.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">{{ 'cancel' | translate }}</button>
  <button mat-flat-button type="button" (click)="save()">{{ 'save_ticket' | translate }}</button>
</mat-dialog-actions>

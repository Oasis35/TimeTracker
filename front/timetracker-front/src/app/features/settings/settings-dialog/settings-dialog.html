<h2 mat-dialog-title>{{ 'settings_title' | translate }}</h2>

<button
  mat-icon-button
  type="button"
  class="close-btn"
  (click)="close()"
  [attr.aria-label]="'cancel' | translate"
>
  <mat-icon aria-hidden="true">close</mat-icon>
</button>

<mat-dialog-content class="settings-content">

  <!-- LANGUE -->
  <section class="setting-group">
    <mat-button-toggle-group
      [value]="currentLanguage()"
      (change)="onLanguageChange($event.value)"
      aria-label="Language"
      hideSingleSelectionIndicator
    >
      <mat-button-toggle value="fr">Francais</mat-button-toggle>
      <mat-button-toggle value="en">English</mat-button-toggle>
    </mat-button-toggle-group>
  </section>

  <!-- UNITÉ -->
  <section class="setting-group">
    <mat-button-toggle-group
      [value]="unit.unitMode()"
      (change)="onUnitChange($event.value)"
      [attr.aria-label]="'settings_date_time' | translate"
      hideSingleSelectionIndicator
    >
      <mat-button-toggle value="day">{{ 'day' | translate }}</mat-button-toggle>
      <mat-button-toggle value="hour">{{ 'hour' | translate }}</mat-button-toggle>
    </mat-button-toggle-group>
  </section>


  <!-- LIEN EXTERNE -->
  <section class="setting-group">
    <div class="setting-group-label">{{ 'settings_external_link' | translate }}</div>
    <mat-form-field appearance="outline" class="url-field">
      <mat-label>{{ 'settings_external_base_url' | translate }}</mat-label>
      <input
        matInput
        type="url"
        [value]="externalBaseUrl()"
        (input)="onExternalBaseUrlChange($any($event.target).value)"
        [placeholder]="'settings_external_base_url_placeholder' | translate"
      />
    </mat-form-field>
    @if (externalUrlPreview()) {
      <div class="url-preview">
        <mat-icon class="url-preview-icon">open_in_new</mat-icon>
        <span>{{ externalUrlPreview() }}</span>
      </div>
    }
  </section>

  <!-- MAINTENANCE -->
  <app-maintenance-page />

</mat-dialog-content>

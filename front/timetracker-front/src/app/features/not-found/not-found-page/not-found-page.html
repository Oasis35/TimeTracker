<section class="not-found-shell" aria-labelledby="not-found-title">
  <div class="not-found-card">
    <p class="status-code" aria-hidden="true">404</p>
    <h1 id="not-found-title">{{ 'not_found_title' | translate }}</h1>
    <p class="description">{{ 'not_found_description' | translate }}</p>

    <a mat-flat-button routerLink="/day" class="back-link">
      <mat-icon aria-hidden="true">arrow_back</mat-icon>
      <span>{{ 'not_found_back_to_day' | translate }}</span>
    </a>
  </div>
</section>

<mat-toolbar class="app-topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">TimeTracker</span>
    </div>

    <nav class="topbar-nav" aria-label="Navigation principale">
      <a
        mat-button
        class="nav-pill"
        routerLink="/day"
        routerLinkActive="nav-pill-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ 'day' | translate }}
      </a>
      <a
        mat-button
        class="nav-pill"
        routerLink="/week"
        routerLinkActive="nav-pill-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ 'week' | translate }}
      </a>
      <a
        mat-button
        class="nav-pill"
        routerLink="/month"
        routerLinkActive="nav-pill-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ 'month' | translate }}
      </a>
      <a
        mat-button
        class="nav-pill"
        routerLink="/tickets-grid"
        routerLinkActive="nav-pill-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ 'grid_view' | translate }}
      </a>
    </nav>

    <div class="topbar-actions">
      @if (!incompleteDays.incompleteDaysRes.isLoading()) {
        <button
          type="button"
          class="incomplete-days-btn"
          [class.incomplete-days-btn-ok]="incompleteDays.count() === 0"
          [class.incomplete-days-btn-warn]="incompleteDays.count() > 0"
          [matTooltip]="incompleteDaysTooltip()"
          matTooltipClass="incomplete-days-tooltip"
          matTooltipPosition="below"
        >
          @if (incompleteDays.count() > 0) {
            <mat-icon class="incomplete-days-icon">warning</mat-icon>
            <span class="incomplete-days-count">{{ incompleteDays.count() }}</span>
          } @else {
            <mat-icon class="incomplete-days-icon">check_circle</mat-icon>
          }
        </button>
      }
      <button
        mat-icon-button
        type="button"
        class="settings-btn"
        (click)="openSettingsDialog()"
        [attr.aria-label]="'settings_title' | translate"
        [matTooltip]="'settings_title' | translate"
      >
        <mat-icon aria-hidden="true">tune</mat-icon>
      </button>
    </div>
  </div>
</mat-toolbar>
<router-outlet />

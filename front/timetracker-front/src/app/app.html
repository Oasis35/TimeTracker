<mat-toolbar class="app-topbar">
  <span class="brand">TimeTracker</span>
  <mat-button-toggle-group
    class="lang-toggle"
    [value]="currentLanguage()"
    (change)="onLanguageChange($event.value)"
    aria-label="Language"
    hideSingleSelectionIndicator
  >
    <mat-button-toggle value="fr">FR</mat-button-toggle>
    <mat-button-toggle value="en">EN</mat-button-toggle>
  </mat-button-toggle-group>
  <mat-button-toggle-group
    class="unit-toggle"
    [value]="unit.unitMode()"
    (change)="onTimeChange($event.value)"
    [attr.aria-label]="'unit_display' | translate"
    hideSingleSelectionIndicator
  >
    <mat-button-toggle value="day">{{ 'day' | translate }}</mat-button-toggle>
    <mat-button-toggle value="hour">{{ 'hour' | translate }}</mat-button-toggle>
  </mat-button-toggle-group>
  <div class="nav-links">
    <a mat-stroked-button class="nav-link" routerLink="/tickets-grid" routerLinkActive="nav-link-active">
      {{ 'grid_view' | translate }}
    </a>
  </div>
</mat-toolbar>
<router-outlet />

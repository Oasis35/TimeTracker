name: timetracker

services:
  timetracker:
    image: timetracker-app:prod
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        BUILD_CONFIGURATION: Release
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Main: Data Source=/data/tracker.db
    ports:
      - "8088:8080"
    volumes:
      - tracker-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tracker-data:
